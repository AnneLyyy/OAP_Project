<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація подій</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/icon.png" type="image/png" />
    <script type="module" src="./app.js"></script>
</head>

<body>

<div id="notice"></div>
<div class="container">

    <h1>Сервіс реєстрації подій</h1>

    <!-- ФОРМА -->
    <form id="createForm">
        <h2 id="formTitle">Нова подія</h2>

        <div class="field">
            <label for="titleInput">Назва</label>
            <input id="titleInput" type="text">
            <p class="error-text" id="titleError"></p>
        </div>

        <div class="field">
            <label for="dateInput">Дата</label>
            <input id="dateInput" type="date">
            <p class="error-text" id="dateError"></p>
        </div>

        <div class="field">
            <label for="locationInput">Локація</label>
            <input id="locationInput" type="text">
            <p class="error-text" id="locationError"></p>
        </div>

        <div class="field">
            <label for="capacityInput">Місця</label>
            <input id="capacityInput" type="number" min="1">
            <p class="error-text" id="capacityError"></p>
        </div>

        <div class="field">
            <label for="descriptionInput">Опис</label>
            <textarea id="descriptionInput" rows="4"></textarea>
            <p class="error-text" id="descriptionError"></p>
        </div>

        <div class="buttons">
            <button type="submit">Зберегти</button>
            <button type="button" id="cancelEdit" class="hidden">Скасувати</button>
        </div>
    </form>

    <!-- ОДНА ТАБЛИЦЯ З ФІЛЬТРАМИ -->
    <section>
        <div class="section-header">
            <div>
                <h2>Список подій</h2>
                <p id="activeFilterInfo" class="muted-text">Показано звичайний список подій</p>
            </div>
            <div id="totalInfo" class="count-badge">Усього подій: 0</div>
        </div>

        <div class="filter-panel">
            <div class="field search-field">
                <label for="searchInput">Пошук по назві</label>
                <input id="searchInput" type="text" placeholder="Наприклад: концерт">
            </div>

            <div class="filter-grid">
                <div class="field">
                    <label for="sortFieldSelect">Сортувати за</label>
                    <select id="sortFieldSelect">
                        <option value="date">Датою</option>
                        <option value="title">Назвою</option>
                        <option value="location">Локацією</option>
                        <option value="capacity">Кількістю місць</option>
                    </select>
                </div>

                <div class="field">
                    <label for="sortDirectionSelect">Напрямок</label>
                    <select id="sortDirectionSelect">
                        <option value="desc">За спаданням</option>
                        <option value="asc">За зростанням</option>
                    </select>
                </div>

                <div class="field">
                    <label for="pageSizeSelect">Подій на сторінці</label>
                    <select id="pageSizeSelect">
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <div class="filter-grid date-grid">
                <div class="field">
                    <label for="fromDateInput">Дата від</label>
                    <input id="fromDateInput" type="date">
                </div>

                <div class="field">
                    <label for="toDateInput">Дата до</label>
                    <input id="toDateInput" type="date">
                </div>
            </div>

            <div class="buttons filter-actions">
                <button type="button" id="applyFilters">Застосувати фільтри</button>
                <button type="button" id="applyDateFilter">Показати за період</button>
                <button type="button" id="topTasks">Топ-3 найбільші події</button>
                <button type="button" id="resetFilters" class="secondary-btn">Скинути</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Назва</th>
                    <th>Дата</th>
                    <th>Локація</th>
                    <th>Місця</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="itemsTableBody"></tbody>
        </table>

        <div class="pagination">
            <button type="button" id="prevPage">Назад</button>
            <span id="pageInfo">Сторінка 1</span>
            <button type="button" id="nextPage">Далі</button>
        </div>
    </section>

</div>

</body>
</html>
